<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>2048 – Even G2</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>

<body>

<div id="app">
  <h1>2048 for Even G2</h1>

  <div id="game-info">
    <p>Score: <span id="score">0</span></p>
    <p>High: <span id="high-score">0</span></p>
    <p>Max: <span id="max-tile">-</span></p>
  </div>

  <button id="newGameBtn">New Game</button>

  <details id="dev-section">
    <summary>Development</summary>
    <button id="resendBtn">Resend to glasses</button>
    <button id="forceGameOverBtn">Force Game Over</button>
    <pre id="event-log"></pre>
    <button id="resetDataBtn">Reset Data</button>
  </details>
</div>

<script type="module" src="/src/main.ts"></script>

</body>
</html>
